<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c000ff;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#0080ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="keyholeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.4" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0a"/>
  
  <!-- Shield -->
  <path d="M 100 20 L 160 50 L 160 110 C 160 150 100 180 100 180 C 100 180 40 150 40 110 L 40 50 Z" 
        fill="url(#shieldGradient)" 
        stroke="url(#shieldGradient)" 
        stroke-width="1.5"
        opacity="0.9"
        filter="drop-shadow(0 0 20px rgba(0, 255, 136, 0.4))"/>
  
  <!-- Keyhole circle -->
  <circle cx="100" cy="95" r="18" 
          fill="#000000" 
          opacity="0.6"
          filter="drop-shadow(0 0 12px rgba(0, 255, 136, 0.3))"/>
  
  <!-- Keyhole inner glow -->
  <circle cx="100" cy="95" r="18" 
          fill="none"
          stroke="url(#shieldGradient)"
          stroke-width="2"
          opacity="0.8"/>
  
  <!-- Keyhole notch (bottom indent) -->
  <circle cx="100" cy="120" r="8" 
          fill="#0a0a0a" 
          opacity="0.8"/>
  
  <!-- Inner keyhole shine -->
  <circle cx="100" cy="90" r="12" 
          fill="url(#keyholeGradient)"
          opacity="0.6"/>
</svg>
